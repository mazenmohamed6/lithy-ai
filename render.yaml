services:
  - type: web
    name: lithy-ai-api
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate && npx nest build
    startCommand: cd backend && npx prisma migrate deploy && node dist/src/main.js
    healthCheckPath: /api/v1/subscriptions/plans
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lithy-ai-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_PRO_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_PREMIUM_PRICE_ID
        sync: false
      - key: STRIPE_PREMIUM_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_AI_PACK_PRICE_ID
        sync: false

databases:
  - name: lithy-ai-db
    region: frankfurt
    plan: free
    postgresMajorVersion: 16
